# stockdb 配置文件
# 修改后重启程序生效

# 数据存储路径（相对于本文件所在目录）
data_dir: ./data
db_path: ./db/meta.db

# 历史数据深度（年）
history_years: 5

# Tick 缓存策略
tick:
  cache_mode: daily   # none | daily | all
  # none  = 不存盘，每次实时拉取
  # daily = 收盘后每天存一份（推荐）
  # all   = 永久保存（硬盘持续增长，谨慎使用）
  keep_days: 30       # daily 模式下保留最近 N 天

# pytdx 行情服务器列表（按优先级排列，自动选第一个可用）
servers:
  - ["180.153.18.170", 7709]   # 上海，稳定
  - ["119.147.212.81", 7709]   # 广东
  - ["124.74.236.50",  7709]   # 上海
  - ["218.75.126.89",  7709]   # 浙江
  - ["125.39.80.41",   7709]   # 北京
  - ["61.135.142.82",  7709]   # 北京

# 需要预存的指数代码（日线，全量）
index_codes:
  - "000001"   # 上证指数
  - "000300"   # 沪深300
  - "000016"   # 上证50
  - "399001"   # 深证成指
  - "399006"   # 创业板指
  - "000905"   # 中证500
  - "000852"   # 中证1000

# 每日更新日志路径
log_dir: ./logs

# 重点分钟线监控/更新的股票代码列表
watchlist:
  - "002173"
  - "002371"
  - "002463"
  - "300308"
  - "300661"
  - "301348"
  - "603986"
